# docker-compose.prod.yml
# Multi-instance VPS: set per deploy directory (see deploy/instances.json):
#   COMPOSE_PROJECT_NAME, NGINX_PUBLISH
name: ${COMPOSE_PROJECT_NAME:-unicorns}

services:
  api:
    image: ghcr.io/unicorns-prj-dev/unicorns-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: "production"
      PORT: "4000"
    expose:
      - "4000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    image: ghcr.io/unicorns-prj-dev/unicorns-web:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      INTERNAL_API_URL: "http://api:4000"
    expose:
      - "3000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/healthcheck').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  nginx:
    # Mirrored from Docker Hub in CI → GHCR so VPS pull avoids registry-1.docker.io (TLS / rate limits).
    image: ghcr.io/unicorns-prj-dev/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PUBLISH:-127.0.0.1:80:80}"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
        restart: true
      web:
        condition: service_healthy
        restart: true
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1280"
