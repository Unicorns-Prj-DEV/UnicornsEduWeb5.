# Mẫu Nginx: một origin — Next.js ở `/`, NestJS ở `/api/` (strip prefix).
#
# Cách dùng nhanh (macOS/Homebrew hoặc nginx bất kỳ):
#   1. Sao chép block `server` vào file được include (vd. `/usr/local/etc/nginx/servers/unicorns.conf`),
#      hoặc `include` đường dẫn tuyệt đối tới bản sao của file này trong `http { ... }`.
#   2. Sửa listen / server_name / proxy tới đúng cổng dev (mặc định: web 3000, api 4000).
#   3. `nginx -t && nginx -s reload`
#
# Env khớp mẫu (listen 8080):
#   apps/web/.env     → NEXT_PUBLIC_BACKEND_URL=http://localhost:8080/api
#   apps/api/.env     → FRONTEND_URL=http://localhost:8080
#                       TRUST_PROXY=true
#   Google OAuth      → GOOGLE_CALLBACK_URL=http://localhost:8080/api/auth/google/callback
#
# Ghi chú Swagger: Nest mount Swagger tại path `/api` trên cổng API thuần; qua gateway URL ngoài
# thường là http://localhost:8080/api/api (xem docs/Cách làm việc.md).

server {
    listen       8080;
    server_name  localhost;

    client_max_body_size 20m;

    # Chuẩn hoá /api → /api/ (tránh rơi xuống location / và Next trả HTML).
    location = /api {
        return 302 /api/;
    }

    # API: bỏ tiền tố /api/ rồi proxy tới Nest (backend nhận /auth/..., /users/..., không có /api).
    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Socket.io (nếu dùng notification gateway qua cùng origin)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Next.js — giữ nguyên URI (không thêm slash sau cổng upstream).
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }
}
