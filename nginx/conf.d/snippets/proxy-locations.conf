# Shared reverse-proxy routes (HTTP + HTTPS server blocks).
# Included from nginx/conf.d/app.conf and optional https vhost.

    # ── Socket.io WebSocket ──────────────────────────────────────────────────
    location /socket.io/ {
        set $upstream_api api;
        proxy_pass         http://$upstream_api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $proxy_x_forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API (strip /api prefix) ──────────────────────────────────────────────
    location = /api {
        return 302 /api/;
    }

    location /api/ {
        set $upstream_api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass         http://$upstream_api:4000;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $proxy_x_forwarded_proto;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
        set $upstream_web web;
        proxy_pass         http://$upstream_web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $proxy_x_forwarded_proto;
    }
