# TLS + redirect HTTP→HTTPS cho it.unicornsedu.com
#
# Bắt buộc đã cấp chứng chỉ trước (Let’s Encrypt), ví dụ:
#   cd /path/to/deploy && sudo certbot certonly --webroot \
#     -w "$(pwd)/nginx/certbot/www" -d it.unicornsedu.com
# Thư mục live trên host: /etc/letsencrypt/live/it.unicornsedu.com/

server {
    listen 80;
    server_name it.unicornsedu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name it.unicornsedu.com;

    ssl_certificate     /etc/letsencrypt/live/it.unicornsedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/it.unicornsedu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    include /etc/nginx/conf.d/snippets/proxy-locations.conf;
}
