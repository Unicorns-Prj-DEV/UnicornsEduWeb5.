# nginx/conf.d/app.conf
#
# Docker Compose gives containers new IPs on recreate. Plain `upstream { server web:3000 }`
# resolves hostnames only at nginx start → stale IP → 502 "Connection refused".
# The global resolver now lives in `nginx/nginx.conf` so both HTTP and any
# Certbot-generated TLS server blocks inherit Docker DNS re-resolution.

server {
    listen 80;
    # Catch-all: IP truy cập trực tiếp + domain khi bạn đổi sau
    server_name _;

    client_max_body_size 20m;

    # ── Socket.io WebSocket ──────────────────────────────────────────────────
    location /socket.io/ {
        set $upstream_api api;
        proxy_pass         http://$upstream_api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API (strip /api prefix) ──────────────────────────────────────────────
    # Exact `/api` would otherwise fall through to `location /` and serve
    # the Next.js app HTML. Normalize to `/api/` so it reaches the API block.
    location = /api {
        return 302 /api/;
    }

    # Trailing slash on proxy_pass strips the /api prefix before forwarding.
    # e.g.  GET /api/auth/login  →  api:4000/auth/login
    location /api/ {
        set $upstream_api api;
        proxy_pass         http://$upstream_api:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
        set $upstream_web web;
        proxy_pass         http://$upstream_web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }
}
