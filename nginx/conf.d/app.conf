# nginx/conf.d/app.conf
#
# Docker Compose gives containers new IPs on recreate. Plain `upstream { server web:3000 }`
# resolves hostnames only at nginx start -> stale IP -> 502 "Connection refused".
# The global resolver now lives in `nginx/nginx.conf` so both HTTP and any
# TLS/tunnel server blocks inherit Docker DNS re-resolution.

server {
    listen 80 default_server;
    # cloudflared should point to http://127.0.0.1:80 on the VPS.
    # Keep this as a catch-all because Cloudflare forwards the public Host.
    server_name localhost 127.0.0.1 _;

    client_max_body_size 20m;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    include /etc/nginx/conf.d/snippets/proxy-locations.conf;
}
