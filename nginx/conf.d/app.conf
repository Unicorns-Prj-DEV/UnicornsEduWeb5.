# nginx/conf.d/app.conf
#
# Docker Compose gives containers new IPs on recreate. Plain `upstream { server web:3000 }`
# resolves hostnames only at nginx start → stale IP → 502 "Connection refused".
# The global resolver now lives in `nginx/nginx.conf` so both HTTP and any
# TLS server blocks inherit Docker DNS re-resolution.

server {
    listen 80 default_server;
    # Catch-all: IP truy cập trực tiếp + mọi Host chưa có server riêng
    server_name _;

    client_max_body_size 20m;

    # Let's Encrypt HTTP-01 (certbot --webroot). Thư mục host: nginx/certbot/www
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/snippets/proxy-locations.conf;
}
