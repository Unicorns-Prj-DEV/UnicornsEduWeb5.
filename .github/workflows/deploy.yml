# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: unicorns-prj-dev

jobs:
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build & push Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    # HTTPS smoke test hostname (optional). Ưu tiên: Secret VPS_PUBLIC_HOST → Variable VPS_PUBLIC_HOST → VPS `.env`.
    env:
      VPS_PUBLIC_HOST: ${{ secrets.VPS_PUBLIC_HOST || vars.VPS_PUBLIC_HOST }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          VPS_PUBLIC_HOST: ${{ env.VPS_PUBLIC_HOST }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Forward hostname for post-deploy curl --resolve (see envs in ssh-action README)
          envs: VPS_PUBLIC_HOST
          # Default 10m is tight when pull + recreate + migrate on small VPS
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /root/UnicornsEdu

            # Keep compose/nginx/workflow-side config on VPS in sync with the
            # commit that triggered this deployment. Without this, the server
            # can keep using stale docker-compose/nginx files while only images
            # are refreshed.
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            # Pull / recreate fewer layers in parallel (lowers RAM spikes on small VPS)
            export COMPOSE_PARALLEL_LIMIT=1

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            wait_for_http() {
              service="$1"
              url="$2"

              for attempt in $(seq 1 60); do
                if docker compose -f docker-compose.prod.yml exec -T "$service" \
                  node -e "fetch(process.argv[1]).then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))" \
                  "$url"; then
                  echo "Service $service is ready at $url"
                  return 0
                fi

                sleep 3
              done

              echo "Timed out waiting for service: $service ($url)"
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=100 "$service"
              container_id="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
              if [ -n "$container_id" ]; then
                docker inspect --format '{{json .State.Health}}' "$container_id" || true
              fi
              exit 1
            }

            wait_for_http api http://127.0.0.1:4000/
            wait_for_http web http://127.0.0.1:3000/api/healthcheck

            # Let's Encrypt: renew if due (requires Certbot on VPS host). No-op when not installed.
            if command -v certbot >/dev/null 2>&1; then
              certbot renew --quiet
            fi

            # Reload nginx after upstream recreate so active workers immediately
            # pick up current Docker DNS answers without a full container restart.
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload

            # HTTPS smoke test (optional): hostname from SSH env (GitHub vars/secrets), else VPS `.env`.
            trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

            DEPLOY_HOST="$(trim_ws "${VPS_PUBLIC_HOST:-}")"
            if [ -z "$DEPLOY_HOST" ] && [ -f .env ]; then
              line="$(grep -E '^[[:space:]]*VPS_PUBLIC_HOST=' .env | tail -n1 || true)"
              if [ -n "$line" ]; then
                val="${line#*=}"
                val="${val%%#*}"
                val="$(trim_ws "$val")"
                val="${val%\"}"
                val="${val#\"}"
                val="${val%\'}"
                val="${val#\'}"
                DEPLOY_HOST="$(trim_ws "$val")"
              fi
            fi

            if [ -n "$DEPLOY_HOST" ] && command -v curl >/dev/null 2>&1; then
              # Some VPS/curl/nginx combos intermittently fail HTTP/2 with
              # "Error in the HTTP2 framing layer" even when TLS routing is fine.
              # Fall back to HTTP/1.1 so we only fail on real HTTPS issues.
              if ! curl -sfS --max-time 25 --resolve "${DEPLOY_HOST}:443:127.0.0.1" \
                "https://${DEPLOY_HOST}/api/" >/dev/null; then
                curl -sfS --http1.1 --max-time 25 --resolve "${DEPLOY_HOST}:443:127.0.0.1" \
                  "https://${DEPLOY_HOST}/api/" >/dev/null
              fi
              echo "HTTPS OK for https://${DEPLOY_HOST}/api/"
            else
              echo "Skipping HTTPS smoke test (set VPS_PUBLIC_HOST in GitHub Variables/Secrets and/or VPS .env)"
            fi

            # Cap Node heap for prisma CLI on memory-constrained hosts
            docker compose -f docker-compose.prod.yml exec -T \
              -e NODE_OPTIONS=--max-old-space-size=384 \
              api npx prisma migrate deploy --schema=./prisma/schema/

            docker image prune -f
