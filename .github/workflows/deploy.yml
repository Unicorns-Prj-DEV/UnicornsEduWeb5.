# .github/workflows/deploy.yml
# Build Docker images → push GHCR → deploy VPS (push main only).
#
# Optional Tailscale: set repo variable TAILSCALE_ENABLED=true so the runner joins
# your tailnet before SSH (see docs/Cách làm việc.md). Use OAuth (recommended) or
# auth key mode via TAILSCALE_AUTH_MODE.
name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: unicorns-prj-dev

jobs:
  build-api:
    name: Build & push API image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build & push Web image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  # Copy official nginx multi-arch manifest to GHCR (VPS only needs ghcr.io after docker login).
  mirror-nginx:
    name: Mirror nginx to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy nginx image index to GHCR
        run: |
          set -euo pipefail
          SRC="docker.io/library/nginx:1.27-alpine"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nginx:1.27-alpine"
          docker buildx imagetools create --tag "$DST" "$SRC"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-api, build-web, mirror-nginx]
    env:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || vars.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Tailscale: ephemeral node on the tailnet (OAuth preferred over long-lived auth keys).
      # Set VPS_HOST to the VPS MagicDNS name or Tailscale IP when this is enabled.
      # ping: wait until VPS is reachable on tailnet (eventual consistency); empty VPS_TAILSCALE_PING → ping same host as SSH.
      - name: Connect Tailscale (OAuth)
        if: ${{ vars.TAILSCALE_ENABLED == 'true' && vars.TAILSCALE_AUTH_MODE != 'authkey' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TAILSCALE_TAGS || 'tag:cicd' }}
          hostname: unicorns-gha-${{ github.run_id }}-${{ github.run_attempt }}
          version: latest
          ping: ${{ vars.VPS_TAILSCALE_PING || secrets.VPS_HOST }}

      - name: Connect Tailscale (auth key)
        if: ${{ vars.TAILSCALE_ENABLED == 'true' && vars.TAILSCALE_AUTH_MODE == 'authkey' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: ${{ vars.TAILSCALE_TAGS || 'tag:cicd' }}
          hostname: unicorns-gha-${{ github.run_id }}-${{ github.run_attempt }}
          version: latest
          ping: ${{ vars.VPS_TAILSCALE_PING || secrets.VPS_HOST }}

      # Without Tailscale: plain TCP SSH (appleboy). With Tailscale: GitHub runner often uses userspace
      # networking — regular SSH must use ProxyCommand through tailscaled (see Tailscale CLI docs: tailscale ssh / tailscale nc).
      - name: Deploy via SSH
        if: ${{ vars.TAILSCALE_ENABLED != 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          command_timeout: 30m
          script_path: scripts/gha-deploy-remote.sh

      - name: Deploy via SSH (Tailscale ProxyCommand)
        if: ${{ vars.TAILSCALE_ENABLED == 'true' }}
        timeout-minutes: 35
        env:
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          KEY="${RUNNER_TEMP}/gha_ts_deploy_key"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" >"$KEY"
          chmod 600 "$KEY"
          TS="/usr/local/bin/tailscale"
          REMOTE="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          {
            printf 'export GHCR_USERNAME=%q\n' "${GHCR_USERNAME:-}"
            printf 'export GHCR_TOKEN=%q\n' "${GHCR_TOKEN:-}"
            cat scripts/gha-deploy-remote.sh
          } | timeout 30m ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            -o "ProxyCommand=sudo -E $TS nc %h %p" \
            -i "$KEY" \
            "$REMOTE" bash -s
