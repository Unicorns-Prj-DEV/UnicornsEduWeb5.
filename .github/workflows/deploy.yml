# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/unicorns-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Default 10m is tight when pull + recreate + migrate on small VPS
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /root/UnicornsEdu

            # Pull / recreate fewer layers in parallel (lowers RAM spikes on small VPS)
            export COMPOSE_PARALLEL_LIMIT=1

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            wait_for_healthy() {
              service="$1"
              container_id="$(docker compose -f docker-compose.prod.yml ps -q "$service")"

              if [ -z "$container_id" ]; then
                echo "No container found for service: $service"
                exit 1
              fi

              for attempt in $(seq 1 40); do
                status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"

                if [ "$status" = "healthy" ]; then
                  echo "Service $service is healthy"
                  return 0
                fi

                if [ "$status" = "unhealthy" ]; then
                  echo "Service $service is unhealthy"
                  docker compose -f docker-compose.prod.yml logs --tail=100 "$service"
                  exit 1
                fi

                sleep 3
              done

              echo "Timed out waiting for service: $service"
              docker compose -f docker-compose.prod.yml logs --tail=100 "$service"
              exit 1
            }

            wait_for_healthy api
            wait_for_healthy web

            # Reload nginx after upstream recreate so active workers immediately
            # pick up current Docker DNS answers without a full container restart.
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload

            # Cap Node heap for prisma CLI on memory-constrained hosts
            docker compose -f docker-compose.prod.yml exec -T \
              -e NODE_OPTIONS=--max-old-space-size=384 \
              api npx prisma migrate deploy --schema=./prisma/schema/

            docker image prune -f
